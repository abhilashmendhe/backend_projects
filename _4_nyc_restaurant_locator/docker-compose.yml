version: "3.9"

services:
  postgis:
    image: postgis/postgis:15-3.4
    container_name: postgis
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgis
      POSTGRES_PASSWORD: postgis123
      POSTGRES_DB: postgis

    ports:
      - "5432:5432"

    volumes:
      # Persistent database
      - postgis_data:/var/lib/postgresql/data

      # Init scripts (runs ONLY on first startup)
      - ./data:/docker-entrypoint-initdb.d:ro,Z

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgis"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis_data:
